# Known TX/Austin datasets — pre-cataloged for faster lookups.
# Agents can discover more via the Socrata catalog API.
#
# IMPORTANT: keep in sync with app/lib/catalog.ts (the frontend's source of truth).
# Field names must be valid Socrata field names — verify with:
#   curl https://<portal>/api/views/<id>.json | jq '.columns[].fieldName'

austin:
  portal: data.austintexas.gov
  datasets:
    building_permits:
      id: 3syk-w9eu
      name: "Issued Construction Permits"
      key_columns: [permittype, status_current, original_address1, original_zip, issue_date]
      updated: daily

    food_inspections:
      id: ecmv-9xxi
      name: "Food Establishment Inspection Scores"
      key_columns: [restaurant_name, score, inspection_date, address, zip_code]
      updated: weekly

    service_requests_311:
      id: xwdj-i9he
      portal: datahub.austintexas.gov
      name: "Austin 311 Public Data"
      key_columns: [sr_type_desc, sr_status_desc, sr_location_zip_code, sr_created_date, sr_department_desc]
      updated: daily

    code_violations:
      id: 6wtj-zbtb
      name: "Code Violation Cases"
      key_columns: [case_type, case_status, location, opened_date]
      updated: daily

    crime_reports:
      id: fdj4-gpfu
      name: "Crime Reports"
      key_columns: [crime_type, location_type, occurred_date, zip_code]
      updated: weekly

    traffic_fatalities:
      id: y2wy-tgr5
      name: "Austin Traffic Fatalities"
      key_columns: [case_status, location, date, mode]
      updated: monthly

texas:
  portal: data.texas.gov
  datasets:
    active_businesses:
      id: 9cir-efmm
      name: "Active Franchise Tax Permit Holders"
      key_columns: [taxpayer_name, taxpayer_city, taxpayer_state, taxpayer_organizational_type]
      updated: quarterly

    state_expenditures:
      id: 2zpi-yjjs
      name: "Texas State Expenditures By County 2024"
      key_columns: [fiscal_year, agency_name, county, major_spending_category, amount]
      updated: monthly

    mixed_beverage:
      id: naix-2893
      name: "Mixed Beverage Gross Receipts"
      key_columns: [location_name, location_city, total_receipts, obligation_end_date_yyyymmdd]
      updated: monthly
