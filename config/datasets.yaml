# Known TX/Austin datasets — pre-cataloged for faster lookups.
# Agents can discover more via the Socrata catalog API.
#
# IMPORTANT: keep in sync with app/lib/catalog.ts (the frontend's source of truth).
# Field names must be valid Socrata field names — verified 2026-05-09 against live APIs.
# Verify with: curl https://<portal>/api/views/<id>.json | jq '.columns[].fieldName'

austin:
  portal: data.austintexas.gov
  datasets:
    building_permits:
      id: 3syk-w9eu
      name: "Issued Construction Permits"
      key_columns: [permittype, status_current, original_address1, original_zip, issue_date, work_class, permit_class_mapped, contractor_company_name, total_job_valuation]
      updated: daily

    food_inspections:
      id: ecmv-9xxi
      name: "Food Establishment Inspection Scores"
      key_columns: [restaurant_name, score, inspection_date, address, zip_code, process_description]
      updated: weekly

    service_requests_311:
      id: xwdj-i9he
      portal: datahub.austintexas.gov
      name: "Austin 311 Public Data"
      key_columns: [sr_type_desc, sr_status_desc, sr_location_zip_code, sr_created_date, sr_department_desc, sr_location]
      updated: daily

    code_violations:
      id: 6wtj-zbtb
      name: "Austin Code Complaint Cases"
      # status values: Active | Closed | Pending  (NOT 'Open')
      key_columns: [case_type, status, address, zip_code, opened_date, priority, department]
      updated: daily

    crime_reports:
      id: fdj4-gpfu
      name: "Crime Reports"
      # Use category_description for text labels (Theft, Burglary, etc.)
      # occ_date is the correct date field (NOT occurred_date)
      key_columns: [crime_type, category_description, location_type, occ_date, council_district, clearance_status, family_violence]
      updated: weekly

    traffic_crashes:
      id: y2wy-tgr5
      name: "Austin Crash Report Data"
      # crash_fatal_fl = 'true'/'false' string; death_cnt for fatality count
      key_columns: [crash_fatal_fl, death_cnt, tot_injry_cnt, rpt_street_name, crash_speed_limit, crash_timestamp, pedestrian_death_count, bicycle_death_count, collsn_desc]
      updated: monthly

texas:
  portal: data.texas.gov
  datasets:
    active_businesses:
      id: 9cir-efmm
      name: "Active Franchise Tax Permit Holders"
      key_columns: [taxpayer_name, taxpayer_city, taxpayer_state, taxpayer_zip, taxpayer_organizational_type, taxpayer_county_code, responsibility_beginning_date]
      updated: quarterly

    state_expenditures:
      id: 2zpi-yjjs
      name: "Texas State Expenditures By County 2024"
      # county field does not exist — use agency_name + major_spending_category + amount
      key_columns: [fiscal_year, agency_name, major_spending_category, amount]
      updated: monthly

    mixed_beverage:
      id: naix-2893
      name: "Mixed Beverage Gross Receipts"
      # location_city does not exist — use taxpayer_city
      key_columns: [location_name, taxpayer_city, total_receipts, liquor_receipts, beer_receipts, wine_receipts, obligation_end_date_yyyymmdd]
      updated: monthly
