  <circle cx="72" cy="38" r="3.5" fill="#D48B10"/>

  <line x1="72" y1="61" x2="72" y2="80" stroke="#3A7FBE" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="72" y1="72" x2="52" y2="88" stroke="#3A7FBE" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="72" y1="72" x2="92" y2="88" stroke="#3A7FBE" stroke-width="1" stroke-opacity="0.5"/>

  <circle cx="72" cy="81" r="3" fill="#3A7FBE"/>
  <circle cx="51" cy="89" r="3" fill="#3A7FBE" fill-opacity="0.85"/>
  <circle cx="93" cy="89" r="3" fill="#3A7FBE" fill-opacity="0.85"/>

  <text
