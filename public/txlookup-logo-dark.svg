  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;800&amp;family=IBM+Plex+Mono:wght@400&amp;display=swap');
    </style>
  </defs>

  <rect width="480" height="160" fill="#0D2340" rx="12"/>

  <polygon
    points="72,18 77,34 94,34 81,44 86,60 72,50 58,60 63,44 50,34 67,34"
    fill="none"
    stroke="#D48B10"
