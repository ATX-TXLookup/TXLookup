name: Deploy to Vercel (Production)

# Auto-deploys main to https://txlookup.vercel.app on every push.
# Replaces hand-running `vercel --prod` from a laptop.
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN       — create at https://vercel.com/account/tokens
#   VERCEL_ORG_ID      — value of `orgId` in .vercel/project.json
#   VERCEL_PROJECT_ID  — value of `projectId` in .vercel/project.json
#
# Vercel project IDs from .vercel/project.json (also pinned in this workflow
# as defaults — secrets override if set):
#   orgId      = team_gTi8bP8KPiXdCKoIj2RL4Iut
#   projectId  = prj_U6oaQXFXvw6ICxek6mHxmITc2ZqL
#
# Env vars (OPENAI_API_KEY, SOCRATA_KEY_ID/SECRET, MIRO_API_TOKEN,
# NEXT_PUBLIC_GA_ID, TXLOOKUP_BASIC_AUTH) live in the Vercel project,
# pulled into the build via `vercel pull`. They never enter this repo.

on:
  # Auto-deploy disabled post-hackathon. The site is stable and we want
  # control over when Vercel ships. Two ways to deploy:
  #   1. Push a v-tag:  git tag v0.2 && git push --tags
  #   2. Fire manually: gh workflow run deploy.yml
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: read

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt artifact
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Deployed: $DEPLOY_URL"

      - name: Verify live
        run: |
          set -euo pipefail
          # The site is basic-auth gated during dev (TXLOOKUP_BASIC_AUTH set on
          # the Vercel project). Hit /robots.txt which the middleware bypasses,
          # then assert the homepage returns 401 OR 200 (both prove the deploy
          # is up — 401 means the gate is doing its job).
          ROBOTS_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://txlookup.vercel.app/robots.txt)
          echo "robots.txt → HTTP $ROBOTS_CODE"
          [ "$ROBOTS_CODE" = "200" ] || [ "$ROBOTS_CODE" = "404" ] || { echo "robots.txt unexpected: $ROBOTS_CODE"; exit 1; }

          HOME_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://txlookup.vercel.app/)
          echo "homepage → HTTP $HOME_CODE"
          # 200 = open; 401 = gated (both prove the deploy is up).
          if [ "$HOME_CODE" != "200" ] && [ "$HOME_CODE" != "401" ]; then
            echo "homepage unexpected: $HOME_CODE"
            exit 1
          fi
          echo "✓ deploy reachable"

      - name: Summary
        run: |
          echo "## Deploy summary" >> $GITHUB_STEP_SUMMARY
          echo "- Deploy URL: ${{ steps.deploy.outputs.deploy_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- Public alias: https://txlookup.vercel.app/" >> $GITHUB_STEP_SUMMARY
          echo "- Verified: HTTP 200 + title + ticker" >> $GITHUB_STEP_SUMMARY
